repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.18
    hooks:
      # Compile requirements
      - id: pip-compile
        args: [pyproject.toml, -o, requirements.txt]

  - repo: local
    hooks:
      - id: notebooks-to-markdown
        name: Convert workshop notebooks to markdown
        entry: uv run python scripts/notebooks_to_markdown.py
        language: system
        files: ^notebooks/(python_basics|using_packages)\.ipynb$
        pass_filenames: true
